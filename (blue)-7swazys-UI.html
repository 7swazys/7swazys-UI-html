<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>7swazys UI Template · 7swazys</title>
    <style>
        
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #0a0f1e 0%, #0c1222 100%);
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', monospace;
            min-height: 100vh;
            padding: 1.5rem;
        }

        .glass-card {
            max-width: 1400px;
            width: 100%;
            margin: 0 auto;
            background: rgba(18, 25, 45, 0.75);
            backdrop-filter: blur(14px);
            border-radius: 2.5rem;
            border: 1px solid rgba(72, 187, 255, 0.25);
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.6);
            overflow: hidden;
        }

        .header {
            padding: 1.75rem 2rem;
            background: rgba(12, 18, 34, 0.7);
            border-bottom: 1px solid rgba(56, 189, 248, 0.3);
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
        }

        .header-left h1 {
            font-size: 1.9rem;
            font-weight: 600;
            background: linear-gradient(135deg, #c0e0ff, #3b82f6);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .sub {
            color: #9ab3d5;
            margin-top: 0.5rem;
            font-size: 0.85rem;
            border-left: 3px solid #3b82f6;
            padding-left: 0.85rem;
        }

        .tabs {
            display: flex;
            flex-wrap: wrap;
            background: rgba(0, 0, 0, 0.3);
            border-bottom: 1px solid #26324a;
            gap: 0.25rem;
            padding: 0 1.5rem;
        }

        .tab-btn {
            background: transparent;
            border: none;
            padding: 1rem 1.5rem;
            font-size: 0.9rem;
            font-weight: 500;
            color: #8caee0;
            cursor: pointer;
            transition: all 0.2s;
            border-bottom: 2px solid transparent;
            font-family: inherit;
        }

        .tab-btn:hover {
            color: white;
            background: rgba(59, 130, 246, 0.1);
        }

        .tab-btn.active {
            color: #3b82f6;
            border-bottom-color: #3b82f6;
        }

        .tab-content {
            display: none;
            padding: 2rem;
            animation: fadeIn 0.25s ease;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px);}
            to { opacity: 1; transform: translateY(0);}
        }

        .btn-primary {
            background: linear-gradient(100deg, #2563eb, #1e40af);
            border: none;
            padding: 0.6rem 1.5rem;
            border-radius: 2rem;
            color: white;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.1s;
        }

        .btn-primary:hover {
            transform: scale(0.98);
        }

        .btn-secondary {
            background: #1e293b;
            border: 1px solid #26324a;
            padding: 0.6rem 1.5rem;
            border-radius: 2rem;
            color: #8caee0;
            cursor: pointer;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-top: 1rem;
        }

        .card {
            background: rgba(12, 18, 34, 0.6);
            border: 1px solid #26324a;
            border-radius: 1.5rem;
            padding: 1.2rem;
            transition: all 0.2s;
        }

        .card:hover {
            border-color: #3b82f6;
            transform: translateY(-3px);
        }

        .input-group {
            margin-bottom: 1rem;
        }

        .input-group label {
            display: block;
            color: #9ab3d5;
            margin-bottom: 0.5rem;
            font-size: 0.8rem;
        }

        input, textarea, select {
            width: 100%;
            background: #0f1422;
            border: 1px solid #26324a;
            border-radius: 1rem;
            padding: 0.8rem 1rem;
            color: white;
            outline: none;
            font-family: inherit;
        }

        input:focus, textarea:focus, select:focus {
            border-color: #3b82f6;
        }

        footer {
            padding: 1rem 2rem;
            text-align: center;
            font-size: 0.7rem;
            color: #4c6188;
            border-top: 1px solid rgba(72, 120, 184, 0.2);
            background: rgba(0, 0, 0, 0.2);
        }

        .text-center { text-align: center; }
        .mt-2 { margin-top: 1rem; }
        .mb-2 { margin-bottom: 1rem; }
        .flex { display: flex; gap: 0.5rem; flex-wrap: wrap; }
        .gap-2 { gap: 1rem; }

        @media (max-width: 700px) {
            body { padding: 0.8rem; }
            .header { flex-direction: column; align-items: start; }
            .tab-btn { padding: 0.7rem 1rem; }
            .tab-content { padding: 1rem; }
        }
    </style>
</head>
<body>

<!-- ========================================
     EXAMPLE PROJECT: Simple Tools Hub
     Replace this entire body with your own content
======================================== -->

<div class="glass-card">
    <div class="header">
        <div class="header-left">
            <h1>7swazys · Tools Hub</h1>
            <div class="sub">7swazys ui template</div>
        </div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" data-tab="home">Home</button>
        <button class="tab-btn" data-tab="tools">Tools</button>
        <button class="tab-btn" data-tab="settings">Settings</button>
    </div>

    <div id="homeTab" class="tab-content active">
        <div class="card-grid">
            <div class="card">
                <h3 style="color:#c0e0ff; margin-bottom: 0.5rem;">Placeholder 1</h3>
                <p style="color:#9ab3d5; font-size: 0.8rem;">Placeholder text 1</p>
                <button class="btn-primary mt-2" onclick="alert('Tool 1 clicked')">Launch</button>
            </div>
            <div class="card">
                <h3 style="color:#c0e0ff; margin-bottom: 0.5rem;">Placeholder 2</h3>
                <p style="color:#9ab3d5; font-size: 0.8rem;">Placeholder text 2</p>
                <button class="btn-primary mt-2" onclick="alert('Tool 2 clicked')">Launch</button>
            </div>
            <div class="card">
                <h3 style="color:#c0e0ff; margin-bottom: 0.5rem;">Placeholder 3</h3>
                <p style="color:#9ab3d5; font-size: 0.8rem;">Placeholder text 3</p>
                <button class="btn-primary mt-2" onclick="alert('Tool 3 clicked')">Launch</button>
            </div>
        </div>
    </div>

    <div id="toolsTab" class="tab-content">
        <div class="input-group">
            <label>Enter something</label>
            <input type="text" id="exampleInput" placeholder="Type something...">
        </div>
        <div class="flex">
            <button class="btn-primary" onclick="alert('Input: ' + document.getElementById('exampleInput').value)">Submit</button>
            <button class="btn-secondary" onclick="document.getElementById('exampleInput').value = ''">Clear</button>
        </div>
    </div>

    <div id="settingsTab" class="tab-content">
        <div class="card">
            <h3 style="color:#c0e0ff; margin-bottom: 1rem;">Settings</h3>
            <div class="input-group">
                <label>Theme preference</label>
                <select id="themeSelect">
                    <option value="dark">Dark (default)</option>
                    <option value="light">Light</option>
                </select>
            </div>
            <button class="btn-primary" onclick="alert('Settings saved')">Save Settings</button>
        </div>
    </div>

    <footer>
        7swazys · Glass UI Template · Replace this with your own footer
    </footer>
</div>

<script>
    
    const tabs = document.querySelectorAll('.tab-btn');
    const homeTab = document.getElementById('homeTab');
    const toolsTab = document.getElementById('toolsTab');
    const settingsTab = document.getElementById('settingsTab');

    function switchTab(tabId) {
        homeTab.classList.remove('active');
        toolsTab.classList.remove('active');
        settingsTab.classList.remove('active');
        
        if (tabId === 'home') homeTab.classList.add('active');
        else if (tabId === 'tools') toolsTab.classList.add('active');
        else if (tabId === 'settings') settingsTab.classList.add('active');
        
        tabs.forEach(btn => {
            const btnTab = btn.getAttribute('data-tab');
            if (btnTab === tabId) btn.classList.add('active');
            else btn.classList.remove('active');
        });
    }

    tabs.forEach(btn => {
        btn.addEventListener('click', () => {
            switchTab(btn.getAttribute('data-tab'));
        });
    });
</script>

</body>
</html>
