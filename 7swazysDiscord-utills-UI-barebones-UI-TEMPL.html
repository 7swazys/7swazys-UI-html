<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>7swazys - UI Template</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-start: #0f0a1e;
            --bg-end: #120c22;
            --card-bg: rgba(25, 18, 45, 0.75);
            --border: rgba(156, 72, 255, 0.25);
            --header-bg: rgba(18, 12, 34, 0.7);
            --grad-start: #dcc0ff;
            --grad-end: #8b38f8;
            --text-light: #dcc0ff;
            --text-muted: #b89bd5;
            --text-white: #ffffff;
            --accent: #8b38f8;
            --btn-start: #7c25eb;
            --btn-end: #541eaf;
            --input-bg: #121022;
            --input-border: #3a264a;
            --card-alt: rgba(18, 12, 34, 0.6);
            --log-bg: #0e0b1a;
        }

        body {
            background: linear-gradient(145deg, var(--bg-start), var(--bg-end));
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', monospace;
            min-height: 100vh;
            padding: 1.5rem;
        }

        .glass-card {
            max-width: 1400px;
            width: 100%;
            margin: 0 auto;
            background: var(--card-bg);
            backdrop-filter: blur(14px);
            border-radius: 2.5rem;
            border: 1px solid var(--border);
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.6);
            overflow: hidden;
        }

        .header {
            padding: 1.75rem 2rem;
            background: var(--header-bg);
            border-bottom: 1px solid var(--input-border);
        }

        .header-left h1 {
            font-size: 1.9rem;
            font-weight: 600;
            background: linear-gradient(135deg, var(--grad-start), var(--grad-end));
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .sub {
            color: var(--text-muted);
            margin-top: 0.5rem;
            font-size: 0.85rem;
            border-left: 3px solid var(--accent);
            padding-left: 0.85rem;
        }

        .tabs {
            display: flex;
            flex-wrap: wrap;
            background: rgba(0, 0, 0, 0.3);
            border-bottom: 1px solid var(--input-border);
            gap: 0.25rem;
            padding: 0 1.5rem;
        }

        .tab-btn {
            background: transparent;
            border: none;
            padding: 1rem 1.5rem;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s;
            border-bottom: 2px solid transparent;
            font-family: inherit;
        }

        .tab-btn:hover {
            color: white;
            background: rgba(139, 56, 248, 0.1);
        }

        .tab-btn.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        .tab-content {
            display: none;
            padding: 2rem;
            animation: fadeIn 0.25s ease;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px);}
            to { opacity: 1; transform: translateY(0);}
        }

        .btn-primary {
            background: linear-gradient(100deg, var(--btn-start), var(--btn-end));
            border: none;
            padding: 0.6rem 1.5rem;
            border-radius: 2rem;
            color: white;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.1s;
        }

        .btn-primary:hover {
            transform: scale(0.98);
        }

        .btn-secondary {
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            padding: 0.6rem 1.5rem;
            border-radius: 2rem;
            color: var(--text-muted);
            cursor: pointer;
        }

        .input-group {
            margin-bottom: 1rem;
        }

        .input-group label {
            display: block;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            font-size: 0.8rem;
        }

        input, textarea, select {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 1rem;
            padding: 0.8rem 1rem;
            color: var(--text-white);
            outline: none;
            font-family: inherit;
        }

        input:focus, textarea:focus, select:focus {
            border-color: var(--accent);
        }

        footer {
            padding: 1rem 2rem;
            text-align: center;
            font-size: 0.7rem;
            color: var(--text-muted);
            border-top: 1px solid rgba(139, 72, 184, 0.2);
            background: rgba(0, 0, 0, 0.2);
        }

        .flex { display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 0.5rem; }

        .two-columns {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
        }

        .left-panel, .right-panel {
            flex: 1;
            min-width: 280px;
        }

        .section {
            background: var(--card-alt);
            border-radius: 1.5rem;
            padding: 1.2rem;
            margin-bottom: 1.5rem;
            border: 1px solid var(--input-border);
        }

        .section-title {
            color: var(--text-light);
            font-weight: 600;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            border-left: 3px solid var(--accent);
            padding-left: 0.8rem;
        }

        .soundcloud-wrapper {
            margin-top: 1rem;
            border-radius: 1rem;
            overflow: hidden;
        }

        iframe {
            width: 100%;
            border-radius: 1rem;
        }

        .theme-buttons {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .theme-card {
            flex: 1;
            min-width: 100px;
            background: var(--input-bg);
            border-radius: 1rem;
            padding: 1rem;
            text-align: center;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
        }

        .theme-card:hover {
            transform: translateY(-2px);
        }

        .theme-card.active {
            border-color: var(--accent);
        }

        .theme-preview {
            width: 50px;
            height: 50px;
            border-radius: 0.8rem;
            margin: 0 auto 0.6rem;
        }

        .theme-name {
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--text-white);
        }

        .console-area {
            background: var(--input-bg);
            border-radius: 1rem;
            padding: 1rem;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 0.8rem;
            min-height: 300px;
            max-height: 400px;
            overflow-y: auto;
        }

        .console-line {
            padding: 0.2rem 0;
            border-bottom: 1px solid var(--input-border);
            font-family: monospace;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .console-input-line {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.5rem;
            align-items: center;
            background: var(--input-bg);
            border-radius: 0.8rem;
            padding: 0.5rem;
        }

        .console-prompt {
            color: var(--accent);
            font-family: monospace;
            font-weight: bold;
        }

        .console-input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-white);
            font-family: monospace;
            outline: none;
        }

        @media (max-width: 700px) {
            body { padding: 0.8rem; }
            .header { flex-direction: column; align-items: start; }
            .tab-btn { padding: 0.7rem 1rem; }
            .tab-content { padding: 1rem; }
            .two-columns { flex-direction: column; }
        }
    </style>
</head>
<body>

<div class="glass-card">
    <div class="header">
        <div class="header-left">
            <h1>7swazys - UI Template</h1>
            <div class="sub">soundcloud player · theme system · live console</div>
        </div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" data-tab="soundcloud">SoundCloud</button>
        <button class="tab-btn" data-tab="themes">Themes</button>
        <button class="tab-btn" data-tab="console">Console</button>
    </div>

    <div id="soundcloudTab" class="tab-content active">
        <div class="section">
            <div class="section-title">SoundCloud Player</div>
            <div class="flex">
                <input type="text" id="soundcloudUrl" placeholder="https://soundcloud.com/artist/track" style="flex:1;">
                <button class="btn-primary" id="loadSoundBtn">Load</button>
            </div>
            <div id="soundcloudPlayer" class="soundcloud-wrapper" style="margin-top: 1.5rem; min-height: 120px;">
                <div style="background: var(--input-bg); border-radius: 1rem; padding: 2rem; text-align: center; color: var(--text-muted);">
                    Enter a SoundCloud URL above and click Load
                </div>
            </div>
        </div>
    </div>

    <div id="themesTab" class="tab-content">
        <div class="section">
            <div class="section-title">Themes</div>
            <div class="theme-buttons">
                <div class="theme-card" data-theme="purple">
                    <div class="theme-preview" style="background: linear-gradient(135deg, #dcc0ff, #8b38f8);"></div>
                    <div class="theme-name">Purple</div>
                </div>
                <div class="theme-card" data-theme="blue">
                    <div class="theme-preview" style="background: linear-gradient(135deg, #c0e0ff, #3b82f6);"></div>
                    <div class="theme-name">Blue</div>
                </div>
                <div class="theme-card" data-theme="red">
                    <div class="theme-preview" style="background: linear-gradient(135deg, #ffc0c0, #f63b3b);"></div>
                    <div class="theme-name">Red</div>
                </div>
            </div>
        </div>
    </div>

    <div id="consoleTab" class="tab-content">
        <div class="section">
            <div class="section-title">Live Console</div>
            <div class="console-area" id="consoleArea">
                <div class="console-line">[system] ui template ready</div>
                <div class="console-line">[system] type help for commands</div>
            </div>
            <div class="console-input-line">
                <span class="console-prompt">$</span>
                <input type="text" class="console-input" id="consoleInput" placeholder="type command...">
            </div>
        </div>
    </div>

    <footer>
        7swazys · glass ui template
    </footer>
</div>

<script>
    const themes = {
        purple: { bgStart: '#0f0a1e', bgEnd: '#120c22', cardBg: 'rgba(25,18,45,0.75)', border: 'rgba(156,72,255,0.25)', headerBg: 'rgba(18,12,34,0.7)', gradStart: '#dcc0ff', gradEnd: '#8b38f8', textLight: '#dcc0ff', textMuted: '#b89bd5', textWhite: '#ffffff', accent: '#8b38f8', btnStart: '#7c25eb', btnEnd: '#541eaf', inputBg: '#121022', inputBorder: '#3a264a', cardAlt: 'rgba(18,12,34,0.6)', logBg: '#0e0b1a', soundColor: '8b38f8' },
        blue: { bgStart: '#0a0f1e', bgEnd: '#0c1222', cardBg: 'rgba(18,25,45,0.75)', border: 'rgba(72,187,255,0.25)', headerBg: 'rgba(12,18,34,0.7)', gradStart: '#c0e0ff', gradEnd: '#3b82f6', textLight: '#c0e0ff', textMuted: '#9ab3d5', textWhite: '#ffffff', accent: '#3b82f6', btnStart: '#2563eb', btnEnd: '#1e40af', inputBg: '#0f1422', inputBorder: '#26324a', cardAlt: 'rgba(12,18,34,0.6)', logBg: '#0a0e1a', soundColor: '3b82f6' },
        red: { bgStart: '#1e0a0f', bgEnd: '#22121a', cardBg: 'rgba(45,18,25,0.75)', border: 'rgba(255,72,72,0.25)', headerBg: 'rgba(34,12,18,0.7)', gradStart: '#ffc0c0', gradEnd: '#f63b3b', textLight: '#ffc0c0', textMuted: '#d59b9b', textWhite: '#ffffff', accent: '#f63b3b', btnStart: '#eb2525', btnEnd: '#af1e1e', inputBg: '#221212', inputBorder: '#4a2626', cardAlt: 'rgba(34,12,18,0.6)', logBg: '#1a0a0a', soundColor: 'f63b3b' }
    };

    const consoleArea = document.getElementById('consoleArea');
    const consoleInput = document.getElementById('consoleInput');

    function addConsoleLine(msg, type = 'info') {
        let line = document.createElement('div');
        line.className = 'console-line';
        if (type === 'error') line.style.color = '#ff6666';
        else if (type === 'success') line.style.color = '#00ff88';
        else if (type === 'warning') line.style.color = '#ffaa44';
        else line.style.color = 'var(--text-muted)';
        
        let timestamp = new Date().toLocaleTimeString();
        line.innerHTML = `[${timestamp}] ${msg}`;
        consoleArea.appendChild(line);
        consoleArea.scrollTop = consoleArea.scrollHeight;
        
        if (consoleArea.children.length > 100) {
            consoleArea.removeChild(consoleArea.children[0]);
        }
    }

    function clearConsole() {
        consoleArea.innerHTML = '';
        addConsoleLine('console cleared', 'warning');
        addConsoleLine('type help for commands', 'info');
    }

    function processCommand(cmd) {
        let parts = cmd.trim().toLowerCase().split(/\s+/);
        let command = parts[0];
        let args = parts.slice(1);

        switch(command) {
            case 'help':
                addConsoleLine('available commands:', 'info');
                addConsoleLine('  help - show this message', 'info');
                addConsoleLine('  clear - clear console', 'info');
                addConsoleLine('  theme [purple/blue/red] - change theme', 'info');
                addConsoleLine('  echo [text] - print text to console', 'info');
                addConsoleLine('  status - show current system status', 'info');
                break;
            case 'clear':
                clearConsole();
                break;
            case 'theme':
                if (args.length === 0) {
                    let current = localStorage.getItem('theme') || 'purple';
                    addConsoleLine(`current theme: ${current}`, 'info');
                } else {
                    let themeName = args[0];
                    if (themes[themeName]) {
                        applyTheme(themeName);
                        document.querySelectorAll('.theme-card').forEach(c => c.classList.remove('active'));
                        document.querySelector(`.theme-card[data-theme="${themeName}"]`).classList.add('active');
                        addConsoleLine(`theme changed to ${themeName}`, 'success');
                    } else {
                        addConsoleLine(`unknown theme: ${themeName}. available: purple, blue, red`, 'error');
                    }
                }
                break;
            case 'echo':
                if (args.length === 0) {
                    addConsoleLine('', 'info');
                } else {
                    addConsoleLine(cmd.slice(5), 'info');
                }
                break;
            case 'status':
                let currentTheme = localStorage.getItem('theme') || 'purple';
                let soundcloudLoaded = document.querySelector('#soundcloudPlayer iframe') !== null;
                addConsoleLine(`system status:`, 'info');
                addConsoleLine(`  theme: ${currentTheme}`, 'info');
                addConsoleLine(`  soundcloud loaded: ${soundcloudLoaded ? 'yes' : 'no'}`, 'info');
                addConsoleLine(`  active tab: ${document.querySelector('.tab-btn.active').getAttribute('data-tab')}`, 'info');
                break;
            default:
                if (cmd.trim()) {
                    addConsoleLine(`unknown command: ${command}. type help for commands`, 'error');
                }
                break;
        }
    }

    function applyTheme(theme) {
        let t = themes[theme];
        document.documentElement.style.setProperty('--bg-start', t.bgStart);
        document.documentElement.style.setProperty('--bg-end', t.bgEnd);
        document.documentElement.style.setProperty('--card-bg', t.cardBg);
        document.documentElement.style.setProperty('--border', t.border);
        document.documentElement.style.setProperty('--header-bg', t.headerBg);
        document.documentElement.style.setProperty('--grad-start', t.gradStart);
        document.documentElement.style.setProperty('--grad-end', t.gradEnd);
        document.documentElement.style.setProperty('--text-light', t.textLight);
        document.documentElement.style.setProperty('--text-muted', t.textMuted);
        document.documentElement.style.setProperty('--text-white', t.textWhite);
        document.documentElement.style.setProperty('--accent', t.accent);
        document.documentElement.style.setProperty('--btn-start', t.btnStart);
        document.documentElement.style.setProperty('--btn-end', t.btnEnd);
        document.documentElement.style.setProperty('--input-bg', t.inputBg);
        document.documentElement.style.setProperty('--input-border', t.inputBorder);
        document.documentElement.style.setProperty('--card-alt', t.cardAlt);
        document.documentElement.style.setProperty('--log-bg', t.logBg);
        localStorage.setItem('theme', theme);
        
        let iframe = document.querySelector('#soundcloudPlayer iframe');
        if (iframe) {
            let src = iframe.src;
            let newSrc = src.replace(/color=[a-fA-F0-9]+/, `color=${t.soundColor}`);
            if (src !== newSrc) {
                iframe.src = newSrc;
                addConsoleLine(`soundcloud player color updated to match ${theme} theme`, 'success');
            }
        }
        
        addConsoleLine(`theme applied: ${theme}`, 'success');
    }

    document.querySelectorAll('.theme-card').forEach(card => {
        card.addEventListener('click', () => {
            let theme = card.getAttribute('data-theme');
            applyTheme(theme);
            document.querySelectorAll('.theme-card').forEach(c => c.classList.remove('active'));
            card.classList.add('active');
            addConsoleLine(`theme changed to ${theme} via theme card`, 'success');
        });
    });

    let saved = localStorage.getItem('theme');
    if (saved && themes[saved]) {
        applyTheme(saved);
        document.querySelector(`.theme-card[data-theme="${saved}"]`).classList.add('active');
        addConsoleLine(`loaded saved theme: ${saved}`, 'info');
    } else {
        applyTheme('purple');
        document.querySelector('.theme-card[data-theme="purple"]').classList.add('active');
    }

    const tabs = document.querySelectorAll('.tab-btn');
    const soundcloudTab = document.getElementById('soundcloudTab');
    const themesTab = document.getElementById('themesTab');
    const consoleTab = document.getElementById('consoleTab');

    function switchTab(tabId) {
        soundcloudTab.classList.remove('active');
        themesTab.classList.remove('active');
        consoleTab.classList.remove('active');
        if (tabId === 'soundcloud') soundcloudTab.classList.add('active');
        else if (tabId === 'themes') themesTab.classList.add('active');
        else if (tabId === 'console') consoleTab.classList.add('active');
        
        tabs.forEach(btn => {
            let btnTab = btn.getAttribute('data-tab');
            if (btnTab === tabId) btn.classList.add('active');
            else btn.classList.remove('active');
        });
        
        addConsoleLine(`switched to ${tabId} tab`, 'info');
    }

    tabs.forEach(btn => {
        btn.addEventListener('click', () => {
            switchTab(btn.getAttribute('data-tab'));
        });
    });

    const soundcloudUrlInput = document.getElementById('soundcloudUrl');
    const loadSoundBtn = document.getElementById('loadSoundBtn');
    const soundcloudPlayer = document.getElementById('soundcloudPlayer');

    loadSoundBtn.addEventListener('click', () => {
        let url = soundcloudUrlInput.value.trim();
        if (!url) {
            soundcloudPlayer.innerHTML = '<div style="background: var(--input-bg); border-radius: 1rem; padding: 2rem; text-align: center; color: #ff6666;">enter a soundcloud url</div>';
            addConsoleLine('error: no soundcloud url provided', 'error');
            return;
        }
        
        let currentTheme = localStorage.getItem('theme') || 'purple';
        let colorCode = themes[currentTheme]?.soundColor || '8b38f8';
        let embedHtml = `<iframe width="100%" height="300" scrolling="no" frameborder="no" allow="autoplay" src="https://w.soundcloud.com/player/?url=${encodeURIComponent(url)}&color=%23${colorCode}&auto_play=true&visual=true"></iframe>`;
        soundcloudPlayer.innerHTML = embedHtml;
        addConsoleLine(`soundcloud track loaded: ${url}`, 'success');
        addConsoleLine(`player color: ${currentTheme} (#${colorCode})`, 'info');
    });

    consoleInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            let cmd = consoleInput.value;
            if (cmd.trim()) {
                addConsoleLine(`> ${cmd}`, 'info');
                processCommand(cmd);
            }
            consoleInput.value = '';
        }
    });

    addConsoleLine('ui template initialized', 'success');
    addConsoleLine('features: soundcloud player, theme system, live console', 'info');
    addConsoleLine('type help to see available commands', 'info');
</script>

</body>
</html>
